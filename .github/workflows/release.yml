name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: Write.exe
            asset_name: Write-windows-x86_64.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: Write
            asset_name: Write-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            binary: Write
            asset_name: Write-macos-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mv artifacts/Write-windows-x86_64.exe/Write.exe artifacts/Write-windows-x86_64.exe.tmp
          rm -rf artifacts/Write-windows-x86_64.exe
          mv artifacts/Write-windows-x86_64.exe.tmp artifacts/Write-windows-x86_64.exe
          mv artifacts/Write-macos-aarch64/Write artifacts/Write-macos-aarch64.tmp
          rm -rf artifacts/Write-macos-aarch64
          mv artifacts/Write-macos-aarch64.tmp artifacts/Write-macos-aarch64
          mv artifacts/Write-macos-x86_64/Write artifacts/Write-macos-x86_64.tmp
          rm -rf artifacts/Write-macos-x86_64
          mv artifacts/Write-macos-x86_64.tmp artifacts/Write-macos-x86_64

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/Write-windows-x86_64.exe
            artifacts/Write-macos-aarch64
            artifacts/Write-macos-x86_64
          generate_release_notes: true
