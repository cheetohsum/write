name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Verify icon exists
        shell: bash
        run: |
          test -f assets/icon.ico || { echo "ERROR: assets/icon.ico not found"; exit 1; }
          echo "Icon file: $(wc -c < assets/icon.ico) bytes"

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Package zip
        shell: bash
        run: |
          mkdir -p dist/Write
          cp target/x86_64-pc-windows-msvc/release/Write.exe dist/Write/
          cp .env.example dist/Write/
          cp README.md dist/Write/
          cp assets/icon.ico dist/Write/
          cd dist && 7z a -tzip ../Write-windows-x86_64.zip Write/

      - name: Build installer
        shell: bash
        run: |
          APP_VERSION="${{ github.ref_name }}"
          APP_VERSION="${APP_VERSION#v}"
          "/c/Program Files (x86)/Inno Setup 6/ISCC.exe" //DMyAppVersion="$APP_VERSION" installer/write.iss

      - uses: actions/upload-artifact@v4
        with:
          name: Write-windows-x86_64
          path: |
            Write-windows-x86_64.zip
            dist/Write-Installer-x86_64.exe

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create .app bundle
        run: |
          APP="Write.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp "target/aarch64-apple-darwin/release/Write" "$APP/Contents/MacOS/write-bin"
          chmod +x "$APP/Contents/MacOS/write-bin"
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nif [ -t 0 ] && [ -t 1 ]; then\n  exec "$DIR/write-bin"\nelse\n  open -a Terminal "$DIR/write-bin"\nfi\n' > "$APP/Contents/MacOS/Write"
          chmod +x "$APP/Contents/MacOS/Write"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>CFBundleName</key><string>Write</string>\n<key>CFBundleDisplayName</key><string>Write</string>\n<key>CFBundleIdentifier</key><string>com.write.app</string>\n<key>CFBundleVersion</key><string>1.0</string>\n<key>CFBundleShortVersionString</key><string>1.0</string>\n<key>CFBundleExecutable</key><string>Write</string>\n<key>CFBundleIconFile</key><string>icon</string>\n<key>CFBundlePackageType</key><string>APPL</string>\n<key>LSMinimumSystemVersion</key><string>11.0</string>\n</dict>\n</plist>\n' > "$APP/Contents/Info.plist"
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size assets/icon.png --out "icon.iconset/icon_${size}x${size}.png"
          done
          for size in 16 32 128 256; do
            double=$((size * 2))
            sips -z $double $double assets/icon.png --out "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"
          cp .env.example "$APP/Contents/Resources/"

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r Write.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          # Set volume icon from the app icon
          cp Write.app/Contents/Resources/icon.icns dmg_staging/.VolumeIcon.icns
          SetFile -a C dmg_staging || true
          hdiutil create -volname "Write" -srcfolder dmg_staging -ov -format UDZO Write-macos-aarch64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Write-macos-aarch64
          path: Write-macos-aarch64.dmg

  build-macos-intel:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Build
        run: cargo build --release --target x86_64-apple-darwin

      - name: Create .app bundle
        run: |
          APP="Write.app"
          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Resources"
          cp "target/x86_64-apple-darwin/release/Write" "$APP/Contents/MacOS/write-bin"
          chmod +x "$APP/Contents/MacOS/write-bin"
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nif [ -t 0 ] && [ -t 1 ]; then\n  exec "$DIR/write-bin"\nelse\n  open -a Terminal "$DIR/write-bin"\nfi\n' > "$APP/Contents/MacOS/Write"
          chmod +x "$APP/Contents/MacOS/Write"
          printf '<?xml version="1.0" encoding="UTF-8"?>\n<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">\n<plist version="1.0">\n<dict>\n<key>CFBundleName</key><string>Write</string>\n<key>CFBundleDisplayName</key><string>Write</string>\n<key>CFBundleIdentifier</key><string>com.write.app</string>\n<key>CFBundleVersion</key><string>1.0</string>\n<key>CFBundleShortVersionString</key><string>1.0</string>\n<key>CFBundleExecutable</key><string>Write</string>\n<key>CFBundleIconFile</key><string>icon</string>\n<key>CFBundlePackageType</key><string>APPL</string>\n<key>LSMinimumSystemVersion</key><string>11.0</string>\n</dict>\n</plist>\n' > "$APP/Contents/Info.plist"
          mkdir -p icon.iconset
          for size in 16 32 128 256 512; do
            sips -z $size $size assets/icon.png --out "icon.iconset/icon_${size}x${size}.png"
          done
          for size in 16 32 128 256; do
            double=$((size * 2))
            sips -z $double $double assets/icon.png --out "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns"
          cp .env.example "$APP/Contents/Resources/"

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r Write.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          cp Write.app/Contents/Resources/icon.icns dmg_staging/.VolumeIcon.icns
          SetFile -a C dmg_staging || true
          hdiutil create -volname "Write" -srcfolder dmg_staging -ov -format UDZO Write-macos-x86_64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: Write-macos-x86_64
          path: Write-macos-x86_64.dmg

  release:
    needs: [build-windows, build-macos-arm, build-macos-intel]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: assets

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare assets
        run: |
          ls -laR artifacts/
          find artifacts/ -type f \( -name '*.zip' -o -name '*.dmg' -o -name '*.exe' \) -exec mv {} ./ \;
          ls -la *.zip *.dmg *.exe

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            Write-Installer-x86_64.exe
            Write-windows-x86_64.zip
            Write-macos-aarch64.dmg
            Write-macos-x86_64.dmg
            assets/icon.png
            assets/icon.ico
          generate_release_notes: true
